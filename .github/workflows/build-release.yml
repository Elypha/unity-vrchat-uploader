name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  packageName: "com.elypha.unity-vrchat-uploader"
  pagesRepo: "Elypha/unity-packages"
  pagesRebuildEvent: "pages-rebuild"

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Prepare package information
        id: info
        run: |
          packageVersion=$(jq -r '.version' package.json)
          echo "packageVersion=${packageVersion}" >> $GITHUB_OUTPUT
          echo "zipName=${{ env.packageName }}-${packageVersion}.zip" >> $GITHUB_OUTPUT
          echo "unitypackageName=${{ env.packageName }}-${packageVersion}.unitypackage" >> $GITHUB_OUTPUT

      - name: Set metadata list
        run: find ./ -name \*.meta >> metaList

      - name: Create .unitypackage
        uses: pCYSl5EDgo/create-unitypackage@b5c57408698b1fab8b3a84d4b67f767b8b7c0be9
        with:
          package-path: ${{ steps.info.outputs.unitypackageName }}
          include-files: metaList

      - name: Create zip
        run: zip -r ${{ steps.info.outputs.zipName }} . -x ".git/*" ".github/*" "metaList" "RELEASE_NOTES.md"

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Make Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.info.outputs.zipName }}
            ${{ steps.info.outputs.unitypackageName }}
            package.json

      - name: Dispatch Pages build notification
        run: |
          curl -L --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_PAGES_REBUILD }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.pagesRepo }}/dispatches" \
            -d '{"event_type":"${{ env.pagesRebuildEvent }}", "client_payload": {"release_version": "${{ github.ref_name }}"}}'
